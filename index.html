<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Operacional Logístico</title>
    <link rel="stylesheet" href="04-style.css">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"> 
</head>

<body>
    <div id="undoToast" class="undo-toast">
        <span id="undoMessage">
            Ocorrência removida.
        </span>
        <button onclick="desfazerExclusao()">
            Desfazer
        </button>
        <div class="undo-progress"></div>
    </div>
<img src = "images/fulbck.jpg" alt = "bluewall" class = logo>

<h1>📦 Controle Operacional Logístico</h1>

<div class="overlay">
    <a class="contBtn" href="contagem.html">
    <i class="bi bi-calculator"></i>
    <a class="mainBtn" href="mainpage.html">
    <i class="bi bi-house-door"></i>
    </a>
</div>

<div class="container">

    <div class="card1" id = "formCard">

        <h2>Nova Ocorrência</h2>

        <input type="text" id="nf" placeholder="Número da Nota Fiscal">

        <input type="text" id="transportadora" placeholder="Transportadora">
        
        <textarea type="text" class="clientArea" id="cliente" placeholder="Cliente"></textarea>

        <textarea id="mtv" placeholder="Motivo"></textarea>

        <select id="tipo">
            <option value="">Tipo da Ocorrência</option>
            <option>Devolução parcial</option>
            <option>Entrega não realizada</option>
            <option>Veículo com problema</option>
            <option>Reagendamento</option>
        </select>
        
        <select id="status">
            <option value="Pendente">Pendente</option>
            <option value="Reentregar">Reentregar</option>
            <option value="DarEntrada">Dar Entrada</option>
        </select>

        <button class="importBtn" onclick="document.getElementById('importarXls').click()">
         <i class="bi bi-file-earmark-arrow-up"></i>
           Importar XLS
      </button>

       <input type="file" class= "importBtn" id="importarXls"accept=".xlsx, .xls" style="display: none;">

        <button class="saveBtn" onclick="adicionarOcorrencia()">
            <i class="bi bi-floppy"></i>
            Salvar Ocorrência
        </button>
        <button class= "exportBtn" onclick="exportXls()">
             <i class="bi bi-file-earmark-excel"></i>
            Exportar para XLS
        </button>

        <button class= "deleteAll" onclick="delAll()">
            <i class="bi bi-trash-fill"></i> 
            Apagar Tudo 
        </button>

        <br><br>

    </div>

    <div class="card">

        <div class="topo">

            <h2>Ocorrências</h2>

        </div>

        <table>

            <thead class = "tableHead">
                <tr>
                    <th>NF</th>
                    <th>Transportadora</th>
                    <th>Ocorrência</th>
                    <th>Ações</th>
                    <th>Data</th>
                </tr>
            </thead>

            <tbody id="tabelaOcorrencias"></tbody>

        </table>

    </div>

</div>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<script src="03-functions.js"></script>

</body>
</html>
